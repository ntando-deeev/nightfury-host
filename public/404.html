<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>404 — NightFury Host</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Inter:wght@400;600&display=swap" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#0a0a0f;color:#e0e0f0;font-family:'Inter',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center}
    h1{font-family:'Orbitron',sans-serif;font-size:6rem;font-weight:900;background:linear-gradient(135deg,#ff6b00,#ff9500);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    h2{font-size:1.4rem;margin:16px 0 8px}
    p{color:#888;margin-bottom:28px}
    a{display:inline-flex;padding:12px 28px;background:linear-gradient(135deg,#ff6b00,#ff9500);color:#fff;text-decoration:none;border-radius:10px;font-weight:700}
  </style>
</head>
<body>
  <div>
    <h1>404</h1>
    <h2>Page not found</h2>
    <p>The fire burned this page down.</p>
    <a href="/">🏠 Go Home</a>
  </div>
</body>
</html>
