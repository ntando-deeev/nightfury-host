<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>🔥 Register — NightFury Host</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--fire:#ff6b00;--fire2:#ff9500;--dark:#0a0a0f;--card:#111118;--border:#1e1e2e;--text:#e0e0f0;--muted:#888;--green:#00e676;--red:#ff4757}
    body{background:var(--dark);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
    body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 60% at 50% -10%,rgba(255,107,0,.18) 0%,transparent 70%);pointer-events:none;z-index:0}
    .auth-card{position:relative;z-index:1;background:var(--card);border:1px solid var(--border);border-radius:20px;padding:48px 40px;width:100%;max-width:440px}
    .auth-logo{font-family:'Orbitron',sans-serif;font-weight:900;font-size:1.6rem;background:linear-gradient(90deg,var(--fire),var(--fire2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-align:center;margin-bottom:8px}
    .auth-sub{text-align:center;color:var(--muted);font-size:.9rem;margin-bottom:8px}
    .bonus-badge{text-align:center;background:rgba(0,230,118,.08);border:1px solid rgba(0,230,118,.25);border-radius:8px;padding:10px;color:var(--green);font-size:.88rem;margin-bottom:28px}
    .form-group{margin-bottom:18px}
    label{display:block;font-size:.85rem;color:var(--muted);margin-bottom:6px;font-weight:500}
    input{width:100%;background:#0d0d14;border:1px solid var(--border);border-radius:10px;padding:12px 16px;color:var(--text);font-size:.95rem;font-family:'Inter',sans-serif;transition:border-color .2s;outline:none}
    input:focus{border-color:var(--fire)}
    .btn{width:100%;padding:14px;border-radius:10px;font-weight:700;font-size:1rem;border:none;cursor:pointer;transition:.2s;font-family:'Inter',sans-serif;margin-top:8px}
    .btn-fire{background:linear-gradient(135deg,var(--fire),var(--fire2));color:#fff}
    .btn-fire:hover{opacity:.85}
    .btn-fire:disabled{opacity:.5;cursor:not-allowed}
    .auth-switch{text-align:center;margin-top:24px;color:var(--muted);font-size:.9rem}
    .auth-switch a{color:var(--fire2);text-decoration:none;font-weight:600}
    .alert{padding:12px 16px;border-radius:10px;margin-bottom:18px;font-size:.9rem;display:none}
    .alert-error{background:rgba(255,71,87,.1);border:1px solid rgba(255,71,87,.3);color:var(--red)}
  </style>
</head>
<body>
  <div class="auth-card">
    <div class="auth-logo">⚡ NIGHTFURY</div>
    <div class="auth-sub">Create your free hosting account</div>
    <div class="bonus-badge">🎁 Get <strong>50 free coins</strong> on signup — no credit card needed</div>
    <div class="alert alert-error" id="alert"></div>
    <form id="regForm">
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="username" placeholder="cooluser123" required minlength="3" maxlength="20"/>
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="you@example.com" required/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="Min 6 characters" required minlength="6"/>
      </div>
      <div class="form-group">
        <label>Referral Code <span style="color:var(--muted)">(optional — get bonus coins)</span></label>
        <input type="text" id="referral" placeholder="XXXXXXXX"/>
      </div>
      <button type="submit" class="btn btn-fire" id="submitBtn">🚀 Create Account</button>
    </form>
    <div class="auth-switch">Already have an account? <a href="/login">Sign in</a></div>
  </div>
  <script>
    // Pre-fill referral from URL ?ref=CODE
    const ref = new URLSearchParams(location.search).get('ref');
    if (ref) document.getElementById('referral').value = ref;

    document.getElementById('regForm').addEventListener('submit', async e => {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      const alert = document.getElementById('alert');
      alert.style.display = 'none';
      btn.disabled = true; btn.textContent = 'Creating account...';
      try {
        const r = await fetch('/api/auth/register', {
          method:'POST', headers:{'Content-Type':'application/json'},
          body: JSON.stringify({
            username: document.getElementById('username').value,
            email: document.getElementById('email').value,
            password: document.getElementById('password').value,
            referral: document.getElementById('referral').value,
          })
        });
        const d = await r.json();
        if (d.success) { window.location.href = d.redirect; }
        else { alert.textContent = d.error; alert.style.display='block'; btn.disabled=false; btn.textContent='🚀 Create Account'; }
      } catch { alert.textContent='Network error'; alert.style.display='block'; btn.disabled=false; btn.textContent='🚀 Create Account'; }
    });
  </script>
</body>
</html>
