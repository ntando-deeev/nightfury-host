<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>👑 Admin Login — NightFury Host</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--fire:#ff6b00;--fire2:#ff9500;--dark:#0a0a0f;--card:#111118;--border:#1e1e2e;--text:#e0e0f0;--muted:#888;--green:#00e676;--red:#ff4757;--purple:#b965ff}
    body{background:var(--dark);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
    body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 60% at 50% -10%,rgba(185,101,255,.15) 0%,transparent 70%);pointer-events:none;z-index:0}
    body::after{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 60% 40% at 50% 110%,rgba(255,107,0,.10) 0%,transparent 60%);pointer-events:none;z-index:0}

    .auth-card{position:relative;z-index:1;background:var(--card);border:1px solid var(--border);border-radius:20px;padding:48px 40px;width:100%;max-width:420px;box-shadow:0 0 60px rgba(185,101,255,.08),0 0 0 1px rgba(185,101,255,.06)}

    .crown{text-align:center;font-size:2.4rem;margin-bottom:12px;filter:drop-shadow(0 0 16px rgba(185,101,255,.6))}
    .auth-logo{font-family:'Orbitron',sans-serif;font-weight:900;font-size:1.5rem;background:linear-gradient(90deg,var(--purple),var(--fire2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-align:center;margin-bottom:6px}
    .auth-sub{text-align:center;color:var(--muted);font-size:.85rem;margin-bottom:8px}
    .admin-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(185,101,255,.1);border:1px solid rgba(185,101,255,.25);color:var(--purple);font-size:.75rem;font-weight:700;padding:4px 12px;border-radius:20px;margin:0 auto 28px;display:flex;justify-content:center;width:fit-content;margin-left:auto;margin-right:auto;margin-bottom:28px}

    .form-group{margin-bottom:20px}
    label{display:block;font-size:.83rem;color:var(--muted);margin-bottom:6px;font-weight:500}
    input{width:100%;background:#0d0d14;border:1px solid var(--border);border-radius:10px;padding:12px 16px;color:var(--text);font-size:.95rem;font-family:'Inter',sans-serif;transition:border-color .2s;outline:none}
    input:focus{border-color:var(--purple)}

    .btn{width:100%;padding:14px;border-radius:10px;font-weight:700;font-size:1rem;border:none;cursor:pointer;transition:.2s;font-family:'Inter',sans-serif;display:flex;align-items:center;justify-content:center;gap:8px}
    .btn-admin{background:linear-gradient(135deg,var(--purple),#7c3aed);color:#fff;box-shadow:0 4px 20px rgba(185,101,255,.3)}
    .btn-admin:hover{opacity:.88;box-shadow:0 6px 28px rgba(185,101,255,.4)}
    .btn-admin:disabled{opacity:.5;cursor:not-allowed;box-shadow:none}

    .divider{border:none;border-top:1px solid var(--border);margin:24px 0}
    .back-link{text-align:center;color:var(--muted);font-size:.85rem}
    .back-link a{color:var(--fire2);text-decoration:none;font-weight:600}
    .back-link a:hover{color:var(--fire)}

    .alert{padding:12px 16px;border-radius:10px;margin-bottom:20px;font-size:.88rem;display:none;align-items:center;gap:8px}
    .alert-error{background:rgba(255,71,87,.1);border:1px solid rgba(255,71,87,.3);color:var(--red)}
    .alert-success{background:rgba(0,230,118,.1);border:1px solid rgba(0,230,118,.3);color:var(--green)}

    .security-note{display:flex;align-items:center;gap:8px;background:rgba(185,101,255,.05);border:1px solid rgba(185,101,255,.12);border-radius:10px;padding:10px 14px;font-size:.78rem;color:var(--muted);margin-bottom:20px}
    .security-note span{font-size:1rem}

    /* spinner */
    @keyframes spin{to{transform:rotate(360deg)}}
    .spinner{width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
  </style>
</head>
<body>
  <div class="auth-card">
    <div class="crown">👑</div>
    <div class="auth-logo">NIGHTFURY</div>
    <div class="auth-sub">Admin Control Panel</div>
    <div class="admin-badge"><span>🔐</span> Restricted Access</div>

    <div class="security-note">
      <span>🛡️</span>
      This portal is for authorised administrators only. Unauthorised access attempts are logged.
    </div>

    <div class="alert alert-error" id="alert" style="display:none"></div>

    <form id="adminLoginForm" autocomplete="off">
      <div class="form-group">
        <label>Email or Username</label>
        <input type="text" id="email" placeholder="admin@nightfury.host" required autocomplete="off"/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="••••••••" required autocomplete="new-password"/>
      </div>
      <button type="submit" class="btn btn-admin" id="submitBtn">
        <span id="btnText">👑 Access Admin Panel</span>
      </button>
    </form>

    <hr class="divider"/>
    <div class="back-link">Not an admin? <a href="/login">Go to regular login</a></div>
  </div>

  <script>
    // If already authenticated as admin, redirect straight in
    (async () => {
      try {
        const r = await fetch('/api/auth/me');
        if (r.ok) {
          const u = await r.json();
          if (u.is_admin) window.location.replace('/admin');
        }
      } catch {}
    })();

    document.getElementById('adminLoginForm').addEventListener('submit', async e => {
      e.preventDefault();
      const btn     = document.getElementById('submitBtn');
      const btnText = document.getElementById('btnText');
      const alert   = document.getElementById('alert');

      alert.style.display = 'none';
      btn.disabled = true;
      btnText.innerHTML = '<span class="spinner"></span> Authenticating…';

      try {
        const r = await fetch('/api/auth/admin-login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email:    document.getElementById('email').value.trim(),
            password: document.getElementById('password').value
          })
        });
        const d = await r.json();
        if (d.success) {
          btnText.innerHTML = '✅ Redirecting…';
          window.location.href = d.redirect;
        } else {
          alert.textContent    = d.error || 'Authentication failed.';
          alert.style.display  = 'flex';
          btn.disabled         = false;
          btnText.textContent  = '👑 Access Admin Panel';
        }
      } catch {
        alert.textContent   = 'Network error. Please try again.';
        alert.style.display = 'flex';
        btn.disabled        = false;
        btnText.textContent = '👑 Access Admin Panel';
      }
    });
  </script>
</body>
</html>
